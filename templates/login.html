<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusAI Login</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .error {
            color: red;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <h2>Student Portal Login</h2>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <div class="form-group">
                <label>Student ID</label>
                <input type="text" name="student_id" required placeholder="e.g. P01/0018/2022">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit">Login</button>
        </form>
        <div style="margin-top: 15px; text-align: center;">
            <p>Don't have an account? <a href="{{ url_for('register') }}"
                    style="color: #007bff; text-decoration: none;">Create one</a></p>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/accessibility.js') }}"></script>

    <!-- WhatsApp Floating Button -->
    <style>
        .whatsapp-float {
            position: fixed;
            width: 60px;
            height: 60px;
            bottom: 40px;
            left: 40px;
            background-color: #25d366;
            color: #FFF;
            border-radius: 50px;
            text-align: center;
            box-shadow: 2px 2px 3px #999;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
            box-shadow: 2px 2px 10px rgba(37, 211, 102, 0.5);
            color: #FFF;
        }

        .whatsapp-float svg {
            width: 35px;
            height: 35px;
            fill: currentColor;
        }

        /* Adjust for mobile */
        @media (max-width: 768px) {
            .whatsapp-float {
                width: 50px;
                height: 50px;
                bottom: 20px;
                left: 20px;
            }

            .whatsapp-float svg {
                width: 30px;
                height: 30px;
            }
        }
    </style>
    <a href="https://wa.me/254741233179" class="whatsapp-float" target="_blank" rel="noopener noreferrer"
        aria-label="Chat with administration on WhatsApp">
        <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <path
                d="M16 2A13.9 13.9 0 0 0 2 16a13.8 13.8 0 0 0 2.2 7.5L2 30l6.7-2.1A13.8 13.8 0 0 0 16 30a13.9 13.9 0 0 0 0-27.8zm0 25.5a11.6 11.6 0 0 1-6-1.7l-.4-.2-4.4 1.4 1.4-4.3-.3-.4A11.6 11.6 0 0 1 16 4.3a11.6 11.6 0 0 1 0 23.2zm6.3-8.6c-.3-.2-2-.9-2.3-1s-.6-.2-.8.2c-.3.4-.9 1-1.1 1.3-.2.3-.4.3-.8.1s-1.4-.5-2.7-1.6c-1-1-1.6-2.1-1.8-2.4s0-.5.2-.6c.2-.2.3-.4.5-.6s.3-.4.4-.7c.1-.3 0-.5 0-.7s-.8-2-1.1-2.7c-.3-.7-.6-.6-.8-.6h-.6c-.3 0-.7.1-1.1.5s-1.4 1.4-1.4 3.4 1.4 4 1.6 4.3c.2.3 3 4.5 7.1 6.3 1 .4 1.8.7 2.4.9 1 .3 1.9.3 2.6.2.8-.1 2.3-.9 2.7-1.9s.4-1.8.3-2c0-.3-.3-.4-.7-.6z" />
        </svg>
    </a>
</body>

</html>
