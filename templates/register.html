<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CampusAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            text-align: center;
            color: #111827;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #374151;
            font-size: 0.875rem;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            box-sizing: border-box;
            /* Important for padding */
        }

        button {
            width: 100%;
            background-color: #2563eb;
            color: white;
            padding: 0.75rem;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        .error {
            color: #dc2626;
            background-color: #fee2e2;
            padding: 0.75rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            text-align: center;
            font-size: 0.875rem;
        }

        .links {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.875rem;
        }

        .links a {
            color: #2563eb;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <h2>Create Account</h2>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <div class="form-group">
                <label for="student_id">Student ID</label>
                <input type="text" id="student_id" name="student_id" required>
            </div>
            <div class="form-group">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Register</button>
        </form>
        <div class="links">
            Already have an account? <a href="{{ url_for('login') }}">Login</a>
        </div>
    </div>

    <!-- WhatsApp Floating Button -->
    <style>
        .whatsapp-float {
            position: fixed;
            width: 60px;
            height: 60px;
            bottom: 40px;
            left: 40px;
            background-color: #25d366;
            color: #FFF;
            border-radius: 50px;
            text-align: center;
            box-shadow: 2px 2px 3px #999;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
            box-shadow: 2px 2px 10px rgba(37, 211, 102, 0.5);
            color: #FFF;
        }

        .whatsapp-float svg {
            width: 35px;
            height: 35px;
            fill: currentColor;
        }

        /* Adjust for mobile */
        @media (max-width: 768px) {
            .whatsapp-float {
                width: 50px;
                height: 50px;
                bottom: 20px;
                left: 20px;
            }

            .whatsapp-float svg {
                width: 30px;
                height: 30px;
            }
        }
    </style>
    <a href="https://wa.me/254741233179" class="whatsapp-float" target="_blank" rel="noopener noreferrer"
        aria-label="Chat with administration on WhatsApp">
        <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <path
                d="M16 2A13.9 13.9 0 0 0 2 16a13.8 13.8 0 0 0 2.2 7.5L2 30l6.7-2.1A13.8 13.8 0 0 0 16 30a13.9 13.9 0 0 0 0-27.8zm0 25.5a11.6 11.6 0 0 1-6-1.7l-.4-.2-4.4 1.4 1.4-4.3-.3-.4A11.6 11.6 0 0 1 16 4.3a11.6 11.6 0 0 1 0 23.2zm6.3-8.6c-.3-.2-2-.9-2.3-1s-.6-.2-.8.2c-.3.4-.9 1-1.1 1.3-.2.3-.4.3-.8.1s-1.4-.5-2.7-1.6c-1-1-1.6-2.1-1.8-2.4s0-.5.2-.6c.2-.2.3-.4.5-.6s.3-.4.4-.7c.1-.3 0-.5 0-.7s-.8-2-1.1-2.7c-.3-.7-.6-.6-.8-.6h-.6c-.3 0-.7.1-1.1.5s-1.4 1.4-1.4 3.4 1.4 4 1.6 4.3c.2.3 3 4.5 7.1 6.3 1 .4 1.8.7 2.4.9 1 .3 1.9.3 2.6.2.8-.1 2.3-.9 2.7-1.9s.4-1.8.3-2c0-.3-.3-.4-.7-.6z" />
        </svg>
    </a>
</body>

</html>
